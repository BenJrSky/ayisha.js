<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ayisha.js Test Suite</title>
    <script src="ayisha-new.js"></script>
    <style>
        body { font-family: Arial, sans-serif; max-width: 1200px; margin: 0 auto; padding: 20px; }
        .test-suite { border: 1px solid #ddd; margin: 20px 0; padding: 20px; border-radius: 8px; }
        .test-case { margin: 10px 0; padding: 10px; border-radius: 4px; }
        .test-pass { background: #d4edda; border: 1px solid #c3e6cb; }
        .test-fail { background: #f8d7da; border: 1px solid #f5c6cb; }
        .test-results { margin-top: 20px; }
        .summary { font-weight: bold; padding: 15px; border-radius: 4px; }
        .summary.pass { background: #d4edda; }
        .summary.fail { background: #f8d7da; }
        pre { background: #f8f9fa; padding: 10px; border-radius: 4px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>🧪 Ayisha.js Test Suite</h1>
    <p>Comprehensive testing of framework features</p>

    <div id="test-results"></div>

    <script>
        class AyishaTestSuite {
            constructor() {
                this.tests = [];
                this.results = [];
                this.currentSuite = null;
            }

            describe(suiteName, testFn) {
                this.currentSuite = suiteName;
                console.group(`Testing: ${suiteName}`);
                testFn();
                console.groupEnd();
            }

            it(testName, testFn) {
                try {
                    testFn();
                    this.results.push({
                        suite: this.currentSuite,
                        name: testName,
                        status: 'pass',
                        error: null
                    });
                    console.log(`✅ ${testName}`);
                } catch (error) {
                    this.results.push({
                        suite: this.currentSuite,
                        name: testName,
                        status: 'fail',
                        error: error.message
                    });
                    console.error(`❌ ${testName}:`, error.message);
                }
            }

            expect(actual) {
                return {
                    toBe: (expected) => {
                        if (actual !== expected) {
                            throw new Error(`Expected ${expected}, got ${actual}`);
                        }
                    },
                    toEqual: (expected) => {
                        if (JSON.stringify(actual) !== JSON.stringify(expected)) {
                            throw new Error(`Expected ${JSON.stringify(expected)}, got ${JSON.stringify(actual)}`);
                        }
                    },
                    toBeTruthy: () => {
                        if (!actual) {
                            throw new Error(`Expected truthy value, got ${actual}`);
                        }
                    },
                    toBeFalsy: () => {
                        if (actual) {
                            throw new Error(`Expected falsy value, got ${actual}`);
                        }
                    },
                    toContain: (expected) => {
                        if (!actual.includes(expected)) {
                            throw new Error(`Expected to contain ${expected}, got ${actual}`);
                        }
                    },
                    toBeInstanceOf: (expected) => {
                        if (!(actual instanceof expected)) {
                            throw new Error(`Expected instance of ${expected.name}, got ${actual.constructor.name}`);
                        }
                    }
                };
            }

            renderResults() {
                const container = document.getElementById('test-results');
                const passed = this.results.filter(r => r.status === 'pass').length;
                const failed = this.results.filter(r => r.status === 'fail').length;
                const total = this.results.length;

                let html = `
                    <div class="summary ${failed === 0 ? 'pass' : 'fail'}">
                        Test Results: ${passed}/${total} passed (${failed} failed)
                    </div>
                `;

                const suites = [...new Set(this.results.map(r => r.suite))];
                
                suites.forEach(suite => {
                    const suiteResults = this.results.filter(r => r.suite === suite);
                    const suitePassed = suiteResults.filter(r => r.status === 'pass').length;
                    const suiteFailed = suiteResults.filter(r => r.status === 'fail').length;

                    html += `
                        <div class="test-suite">
                            <h3>${suite} (${suitePassed}/${suiteResults.length} passed)</h3>
                    `;

                    suiteResults.forEach(result => {
                        html += `
                            <div class="test-case test-${result.status}">
                                ${result.status === 'pass' ? '✅' : '❌'} ${result.name}
                                ${result.error ? `<br><small>Error: ${result.error}</small>` : ''}
                            </div>
                        `;
                    });

                    html += '</div>';
                });

                container.innerHTML = html;
            }

            run() {
                this.runTests();
                this.renderResults();
            }

            runTests() {
                // Core Framework Tests
                this.describe('Core Framework', () => {
                    this.it('should create Ayisha instance', () => {
                        this.expect(window.ayisha).toBeTruthy();
                        this.expect(window.ayisha).toBeInstanceOf(window.Ayisha);
                    });

                    this.it('should have reactive state', () => {
                        const testInstance = new window.Ayisha();
                        testInstance.setState({ test: 'value' });
                        this.expect(testInstance.getState().test).toBe('value');
                    });

                    this.it('should compile and cache functions', () => {
                        const testInstance = new window.Ayisha();
                        const fn1 = testInstance.compile('x', 'return x * 2');
                        const fn2 = testInstance.compile('x', 'return x * 2'); // Should return cached
                        this.expect(fn1).toBe(fn2);
                        this.expect(fn1(5)).toBe(10);
                    });
                });

                // State Management Tests
                this.describe('State Management', () => {
                    this.it('should trigger watchers on state change', () => {
                        const testInstance = new window.Ayisha();
                        let triggered = false;
                        
                        testInstance.addWatcher('test', () => { triggered = true; });
                        testInstance.state.test = 'new value';
                        
                        this.expect(triggered).toBeTruthy();
                    });

                    this.it('should support nested property lookup', () => {
                        const testInstance = new window.Ayisha();
                        const obj = { user: { name: 'John', profile: { age: 30 } } };
                        
                        this.expect(testInstance.lookup(obj, 'user.name')).toBe('John');
                        this.expect(testInstance.lookup(obj, 'user.profile.age')).toBe(30);
                    });

                    this.it('should evaluate expressions in state context', () => {
                        const testInstance = new window.Ayisha();
                        testInstance.setState({ name: 'John', age: 30 });
                        
                        this.expect(testInstance.evaluate('name')).toBe('John');
                        this.expect(testInstance.evaluate('age > 18')).toBeTruthy();
                    });
                });

                // Component System Tests
                this.describe('Component System', () => {
                    this.it('should register components', () => {
                        const testInstance = new window.Ayisha();
                        testInstance.component('test-comp', { template: '<div>Test</div>' });
                        
                        this.expect(testInstance.components.has('test-comp')).toBeTruthy();
                    });

                    this.it('should handle function components', () => {
                        const testInstance = new window.Ayisha();
                        testInstance.component('func-comp', (props) => `<div>${props.name}</div>`);
                        
                        const comp = testInstance.components.get('func-comp');
                        this.expect(comp.render).toBeTruthy();
                    });
                });

                // Validation System Tests
                this.describe('Validation System', () => {
                    this.it('should register custom validators', () => {
                        const testInstance = new window.Ayisha();
                        testInstance.validate('custom', (value) => ({ valid: value === 'test', message: 'Must be test' }));
                        
                        this.expect(testInstance.validators.has('custom')).toBeTruthy();
                    });

                    this.it('should validate required fields', () => {
                        const testInstance = new window.Ayisha();
                        const validator = testInstance.validators.get('required');
                        
                        this.expect(validator('').valid).toBeFalsy();
                        this.expect(validator('value').valid).toBeTruthy();
                        this.expect(validator(null).valid).toBeFalsy();
                    });

                    this.it('should validate email format', () => {
                        const testInstance = new window.Ayisha();
                        const validator = testInstance.validators.get('email');
                        
                        this.expect(validator('test@example.com').valid).toBeTruthy();
                        this.expect(validator('invalid-email').valid).toBeFalsy();
                        this.expect(validator('').valid).toBeTruthy(); // Empty is valid for email
                    });
                });

                // Animation System Tests
                this.describe('Animation System', () => {
                    this.it('should register animations', () => {
                        const testInstance = new window.Ayisha();
                        testInstance.animate('custom-fade', { from: { opacity: 0 }, to: { opacity: 1 } });
                        
                        this.expect(testInstance.animations.has('custom-fade')).toBeTruthy();
                    });

                    this.it('should have built-in animations', () => {
                        const testInstance = new window.Ayisha();
                        
                        this.expect(testInstance.animations.has('fadeIn')).toBeTruthy();
                        this.expect(testInstance.animations.has('fadeOut')).toBeTruthy();
                        this.expect(testInstance.animations.has('slideDown')).toBeTruthy();
                        this.expect(testInstance.animations.has('slideUp')).toBeTruthy();
                    });
                });

                // Plugin System Tests
                this.describe('Plugin System', () => {
                    this.it('should install function plugins', () => {
                        const testInstance = new window.Ayisha();
                        let installed = false;
                        
                        const plugin = function() { installed = true; };
                        plugin.name = 'test-plugin';
                        
                        testInstance.use(plugin);
                        
                        this.expect(installed).toBeTruthy();
                        this.expect(testInstance.plugins.has('test-plugin')).toBeTruthy();
                    });

                    this.it('should install object plugins', () => {
                        const testInstance = new window.Ayisha();
                        let installed = false;
                        
                        const plugin = {
                            name: 'object-plugin',
                            install() { installed = true; }
                        };
                        
                        testInstance.use(plugin);
                        
                        this.expect(installed).toBeTruthy();
                        this.expect(testInstance.plugins.has('object-plugin')).toBeTruthy();
                    });

                    this.it('should create plugins with createPlugin method', () => {
                        const testInstance = new window.Ayisha();
                        
                        const plugin = testInstance.createPlugin('created-plugin', {
                            state: { pluginValue: 'test' },
                            methods: {
                                pluginMethod() { return 'plugin-result'; }
                            }
                        });
                        
                        this.expect(plugin.name).toBe('created-plugin');
                        this.expect(plugin.install).toBeTruthy();
                    });
                });

                // Advanced Features Tests
                this.describe('Advanced Features', () => {
                    this.it('should create reactive forms', () => {
                        const testInstance = new window.Ayisha();
                        const form = testInstance.createForm({
                            name: [{ type: 'required' }],
                            email: [{ type: 'email' }]
                        });
                        
                        this.expect(form.data).toBeTruthy();
                        this.expect(form.errors).toBeTruthy();
                        this.expect(form.validate).toBeTruthy();
                    });

                    this.it('should create stores', () => {
                        const testInstance = new window.Ayisha();
                        const store = testInstance.createStore({ count: 0 });
                        
                        this.expect(store.state).toBeTruthy();
                        this.expect(store.commit).toBeTruthy();
                        this.expect(store.dispatch).toBeTruthy();
                    });

                    this.it('should create routers', () => {
                        const testInstance = new window.Ayisha();
                        const router = testInstance.createRouter([
                            { path: '/test', component: '<div>Test</div>' }
                        ]);
                        
                        this.expect(router.routes).toBeTruthy();
                        this.expect(router.navigate).toBeTruthy();
                        this.expect(router.routes.has('/test')).toBeTruthy();
                    });
                });

                // Error Handling Tests
                this.describe('Error Handling', () => {
                    this.it('should handle custom error handlers', () => {
                        const testInstance = new window.Ayisha();
                        let errorHandled = false;
                        
                        testInstance.onError(() => { errorHandled = true; });
                        testInstance._handleError(new Error('test error'));
                        
                        this.expect(errorHandled).toBeTruthy();
                    });

                    this.it('should support error recovery strategies', () => {
                        const testInstance = new window.Ayisha();
                        let fallbackCalled = false;
                        
                        testInstance.onError(() => 'fallback');
                        testInstance._handleErrorWithRecovery(new Error('test'), {
                            fallback: () => { fallbackCalled = true; }
                        });
                        
                        // Note: This test might need adjustment based on implementation
                        this.expect(true).toBeTruthy(); // Placeholder
                    });
                });

                // Testing Utilities Tests
                this.describe('Testing Utilities', () => {
                    this.it('should create test instances', () => {
                        const test = window.ayisha.createTestInstance('<div id="test">Test</div>');
                        
                        this.expect(test.instance).toBeTruthy();
                        this.expect(test.container).toBeTruthy();
                        this.expect(test.cleanup).toBeTruthy();
                        
                        const element = test.findByAttribute('id');
                        this.expect(element).toBeTruthy();
                        this.expect(element.textContent).toBe('Test');
                        
                        test.cleanup();
                    });

                    this.it('should handle test instance state', () => {
                        const test = window.ayisha.createTestInstance('<span @text="message"></span>');
                        
                        test.setState({ message: 'Hello Test' });
                        this.expect(test.getState().message).toBe('Hello Test');
                        
                        test.cleanup();
                    });
                });

                // Performance Tests
                this.describe('Performance', () => {
                    this.it('should cache compiled functions', () => {
                        const testInstance = new window.Ayisha();
                        const startSize = testInstance._fnCache.size;
                        
                        testInstance.compile('x', 'return x');
                        testInstance.compile('x', 'return x'); // Should use cache
                        
                        this.expect(testInstance._fnCache.size).toBe(startSize + 1);
                    });

                    this.it('should handle memory cleanup', () => {
                        const testInstance = new window.Ayisha();
                        testInstance.setState({ test: 'value' });
                        testInstance.addWatcher('test', () => {});
                        
                        const watcherCount = Object.keys(testInstance.watchers).length;
                        testInstance.destroy();
                        
                        this.expect(testInstance._fnCache.size).toBe(0);
                        this.expect(Object.keys(testInstance.watchers).length).toBe(0);
                    });
                });
            }
        }

        // Wait for DOM and Ayisha to be ready
        document.addEventListener('DOMContentLoaded', () => {
            // Give Ayisha time to initialize
            setTimeout(() => {
                const testSuite = new AyishaTestSuite();
                testSuite.run();
                
                console.log('%c🧪 Ayisha.js Test Suite Complete', 'font-size: 18px; font-weight: bold; color: #28a745;');
                console.log('Check the page for detailed results');
            }, 500);
        });
    </script>
</body>
</html>
