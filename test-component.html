<div style="background: #d0f0d0; padding: 1em; margin: 1em 0; border: 2px solid #4CAF50;">
    <h3>Component Content</h3>
    
    <init>
        componentMessage = "This is from component init!";
        componentCounter = 10;
        items = ['apple', 'banana', 'cherry'];
    </init>

    <p>Component message: <strong>{{componentMessage}}</strong></p>
    <p>Component counter: <strong>{{componentCounter}}</strong></p>
    
    <button @click="componentCounter++" @set="componentCounter = componentCounter || 0">
        Increment: {{componentCounter}}
    </button>
    
    <div>
        <h4>Items from component init:</h4>
        <ul>
            <li @for="item in items">{{item}}</li>
        </ul>
    </div>
    
    <button @click="items.push('item_' + items.length)">Add Item</button>
</div>
