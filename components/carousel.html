<div class="carousel">
  <button @click="state.currentSlide = (state.currentSlide-1+slides.length)%slides.length">&#8592;</button>
  <div class="slide">
    <img src="{slides[currentSlide].img}" alt="Slide" style="max-width:300px;">
    <p>{{ slides[currentSlide].caption }}</p>
  </div>
  <button @click="state.currentSlide = (state.currentSlide+1)%slides.length">&#8594;</button>
</div>
