<h2>Post dinamici da JSONPlaceholder</h2>

<button @click="state.posts = null" style="margin-bottom:1em">Ricarica post</button>

<ul>

    <li @for="post in state.posts" style="margin-bottom:1em">
        <strong>{{post.title}}</strong><br>
        <span>{{post.body}}</span>
    </li>
</ul>

<component @src="fetch/fetch.html"></component>
