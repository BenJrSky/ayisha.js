<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ayisha Blog Demo</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Montserrat', Arial, sans-serif;
      background: linear-gradient(135deg, #f8fafc 0%, #e0e7ff 100%);
      margin: 0;
      min-height: 100vh;
      color: #22223b;
    }
    header {
      background: linear-gradient(90deg, #7f53ac 0%, #647dee 100%);
      color: #fff;
      padding: 2rem 1rem 1.2rem 1rem;
      text-align: center;
      box-shadow: 0 2px 12px #7f53ac22;
      letter-spacing: 1px;
    }
    .container {
      max-width: 800px;
      margin: 2rem auto;
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 4px 32px #647dee22;
      padding: 2rem 1.5rem 2.5rem 1.5rem;
    }
    .post-list {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
    }
    .post-card {
      background: linear-gradient(120deg, #f9fafc 60%, #e0e7ff 100%);
      border-radius: 14px;
      box-shadow: 0 2px 12px #647dee11;
      padding: 1.2rem 1rem 1.5rem 1rem;
      transition: transform 0.15s, box-shadow 0.15s;
      cursor: pointer;
      border: 2px solid transparent;
    }
    .post-card:hover {
      transform: translateY(-4px) scale(1.03);
      box-shadow: 0 6px 24px #7f53ac33;
      border-color: #7f53ac44;
      background: linear-gradient(120deg, #e0e7ff 60%, #f9fafc 100%);
    }
    .post-title {
      font-size: 1.2rem;
      font-weight: 700;
      color: #7f53ac;
      margin-bottom: 0.5rem;
    }
    .post-body {
      color: #22223b;
      font-size: 1rem;
      margin-bottom: 0.5rem;
    }
    .post-detail {
      margin-bottom: 2rem;
    }
    .back-btn {
      background: #647dee;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.5rem 1.2rem;
      font-size: 1rem;
      cursor: pointer;
      margin-bottom: 1.5rem;
      transition: background 0.15s;
    }
    .back-btn:hover {
      background: #7f53ac;
    }
    .comments {
      margin-top: 2rem;
      background: #f3f0ff;
      border-radius: 10px;
      padding: 1.2rem 1rem;
      box-shadow: 0 2px 8px #7f53ac11;
    }
    .comment {
      margin-bottom: 1.2rem;
      padding-bottom: 0.8rem;
      border-bottom: 1px solid #e0e7ff;
    }
    .comment:last-child {
      border-bottom: none;
      margin-bottom: 0;
      padding-bottom: 0;
    }
    .comment-name {
      font-weight: 700;
      color: #7f53ac;
      font-size: 1.05rem;
    }
    .comment-email {
      color: #647dee;
      font-size: 0.95rem;
      margin-bottom: 0.2rem;
    }
    .comment-body {
      color: #22223b;
      font-size: 1rem;
    }
    @media (max-width: 600px) {
      .container { padding: 1rem 0.3rem; }
      .post-list { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Ayisha Blog Demo</h1>
    <p>Post e commenti demo, stile moderno, dati da <a href="https://jsonplaceholder.typicode.com/" style="color:#fff;text-decoration:underline;">jsonplaceholder</a></p>
  </header>
  <div class="container" id="app">
    <!-- AyishaVDOM mount point -->
    <div>
      <h2 style="color:#647dee;margin-bottom:1.5rem;">Ultimi Post</h2>
      <div class="post-list">
        <div @for="post in posts" class="post-card" @click="state.currentPostId=post.id;state.currentPage='detail'">
          <div class="post-title">{{post.title}}</div>
          <div class="post-body">{{post.body.slice(0, 80)}}...</div>
        </div>
      </div>
    </div>

    <div @page="detail">
      <button class="back-btn" @click="state.currentPage='list'">&larr; Torna ai post</button>
      <div class="post-detail" @fetch="https://jsonplaceholder.typicode.com/posts/{currentPostId}" @result="postDetail">
        <h2 class="post-title">{{postDetail.title}}</h2>
        <div class="post-body">{{postDetail.body}}</div>
      </div>
      <div class="comments" @fetch="https://jsonplaceholder.typicode.com/posts/{currentPostId}/comments" @result="comments">
        <h3 style="color:#647dee;margin-bottom:1rem;">Commenti</h3>
        <div @for="c in comments" class="comment">
          <div class="comment-name">{{c.name}}</div>
          <div class="comment-email">{{c.email}}</div>
          <div class="comment-body">{{c.body}}</div>
        </div>
      </div>
    </div>

    <div class="comments" @fetch="https://jsonplaceholder.typicode.com/posts?_limit=12" @result="posts"></div>

  </div>
  <script src="./ayisha-virtual.js"></script>
</body>
</html>
