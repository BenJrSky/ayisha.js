<!DOCTYPE html>
<html>
<head>
    <title>Debug Click Handlers</title>
    <script src="ayisha.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-case { border: 1px solid #ccc; margin: 10px 0; padding: 10px; }
        button { margin: 5px; padding: 5px 10px; }
    </style>
</head>
<body>
    <div id="app">
        <h1>Debug Click Handlers</h1>
        
        <div class="test-case">
            <h3>Test 1: Simple State Click (Working)</h3>
            <p>Counter: <span @text="counter"></span></p>
            <button @click="counter++">Increment Counter</button>
            <button @click="counter = 0">Reset Counter</button>
        </div>

        <div class="test-case">
            <h3>Test 2: Array Methods (Working)</h3>
            <p>Items: <span @text="items.length"></span></p>
            <button @click="items.push('New Item ' + Date.now())">Add Item</button>
            <button @click="items = []">Clear Items</button>
            <ul>
                <li @for="item in items" @text="item"></li>
            </ul>
        </div>

        <div class="test-case">
            <h3>Test 3: Context Object Operations (FAILING)</h3>
            <p>Posts: <span @text="posts.length"></span></p>
            <button @click="posts.push({id: Date.now(), title: 'New Post', likes: 0, editing: false})">Add Post</button>
            <ul>
                <li @for="post in posts" @key="post.id">
                    <strong @text="post.title"></strong>
                    <span> - Likes: <span @text="post.likes"></span></span>
                    <button @click="post.likes++">👍 Like</button>
                    <button @click="post.editing = !post.editing">✏️ Edit</button>
                    <button @click="posts = posts.filter(p => p.id !== post.id)">🗑️ Delete</button>
                    <div @if="post.editing">
                        <p>Editing mode for: <span @text="post.title"></span></p>
                        <button @click="post.editing = false">Cancel Edit</button>
                    </div>
                </li>
            </ul>
        </div>

        <div class="test-case">
            <h3>Test 4: Multiple Expressions (NEW FEATURE)</h3>
            <p>Color: <span @text="bgColor"></span> | Size: <span @text="textSize"></span> | Radius: <span @text="borderRadius"></span></p>
            <div @style="'background-color:' + bgColor + '; font-size:' + textSize + 'px; border-radius:' + borderRadius + 'px; padding: 10px; margin: 5px;'">
                Sample styled div
            </div>
            <button @click="bgColor='#4CAF50'">Green</button>
            <button @click="bgColor='#9C27B0'; textSize=32; borderRadius=0">Purple + Big + Square</button>
            <button @click="bgColor='#2196F3'; textSize=16; borderRadius=8">Blue + Normal + Rounded</button>
        </div>
    </div>

    <script>
        new Ayisha({
            el: '#app',
            state: {
                counter: 0,
                items: ['Initial Item'],
                posts: [
                    {id: 1, title: 'First Post', likes: 0, editing: false},
                    {id: 2, title: 'Second Post', likes: 5, editing: false}
                ],
                bgColor: '#f0f0f0',
                textSize: 16,
                borderRadius: 4
            }
        });
    </script>
</body>
</html>
